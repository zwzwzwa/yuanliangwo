<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffd9e5" />
  <title>可以原谅我吗？</title>

  <style>
    :root {
      --forgive-scale: 1;
      --refuse-scale: 1;
      --pink: #ff6f91;
      --pink-deep: #ef4f7b;
      --purple: #8a79d6;
      --text: #493d4d;
      --muted: #7c6f80;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      padding: max(20px, env(safe-area-inset-top))
               max(16px, env(safe-area-inset-right))
               max(20px, env(safe-area-inset-bottom))
               max(16px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
      font-family:
        "Microsoft YaHei",
        "PingFang SC",
        "Noto Sans SC",
        system-ui,
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.95), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(255,255,255,.65), transparent 24%),
        linear-gradient(145deg, #ffd9e5 0%, #e4e4ff 48%, #d8f2ff 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(12px);
      opacity: .45;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
    }

    body::before {
      width: 220px;
      height: 220px;
      top: -70px;
      left: -60px;
      background: #ffafc3;
    }

    body::after {
      width: 260px;
      height: 260px;
      right: -90px;
      bottom: -90px;
      background: #a7dfff;
      animation-delay: -4s;
    }

    .floating-layer,
    .confetti-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .float-heart {
      position: absolute;
      bottom: -40px;
      opacity: .45;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 4px 8px rgba(255, 111, 145, .2));
    }

    .app {
      position: relative;
      z-index: 3;
      width: min(720px, 96vw);
      max-height: calc(100dvh - 32px);
      overflow: auto;
      scrollbar-width: none;
      padding: clamp(24px, 5vw, 48px);
      border: 1px solid rgba(255, 255, 255, .82);
      border-radius: 32px;
      background: rgba(255, 255, 255, .72);
      box-shadow:
        0 28px 80px rgba(92, 73, 111, .22),
        inset 0 1px 0 rgba(255, 255, 255, .86);
      backdrop-filter: blur(20px);
      text-align: center;
    }

    .app::-webkit-scrollbar {
      display: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px 14px;
      border: 1px solid rgba(255, 111, 145, .2);
      border-radius: 999px;
      background: rgba(255, 240, 245, .75);
      color: #b95573;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .pig-scene {
      position: relative;
      width: 150px;
      height: 135px;
      margin: 4px auto 8px;
      animation: pigFloat 2.5s ease-in-out infinite;
    }

    .pig-ear {
      position: absolute;
      top: 13px;
      width: 46px;
      height: 55px;
      border: 5px solid #e87b98;
      background: #ffb0c2;
      border-radius: 60% 60% 45% 45%;
      z-index: 0;
    }

    .pig-ear.left {
      left: 15px;
      transform: rotate(-28deg);
    }

    .pig-ear.right {
      right: 15px;
      transform: rotate(28deg);
    }

    .pig-ear::after {
      content: "";
      position: absolute;
      inset: 10px 11px 12px;
      border-radius: 50%;
      background: #f47e9e;
      opacity: .58;
    }

    .pig-face {
      position: absolute;
      inset: 24px 14px 4px;
      border: 5px solid #e87b98;
      border-radius: 48% 48% 45% 45%;
      background:
        radial-gradient(circle at 36% 32%, rgba(255,255,255,.72), transparent 11%),
        linear-gradient(160deg, #ffd0da, #ff9fb5);
      box-shadow:
        0 14px 24px rgba(222, 104, 137, .2),
        inset 0 -8px 0 rgba(232, 123, 152, .08);
      z-index: 1;
    }

    .eye {
      position: absolute;
      top: 39px;
      width: 10px;
      height: 15px;
      border-radius: 50%;
      background: #573d49;
      transition: transform .25s ease;
    }

    .eye.left {
      left: 31px;
    }

    .eye.right {
      right: 31px;
    }

    .eye::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 4px;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      background: white;
    }

    .brow {
      position: absolute;
      top: 27px;
      width: 21px;
      height: 10px;
      border-top: 3px solid #8f5d6c;
      border-radius: 50%;
      opacity: .85;
    }

    .brow.left {
      left: 24px;
      transform: rotate(12deg);
    }

    .brow.right {
      right: 24px;
      transform: rotate(-12deg);
    }

    .snout {
      position: absolute;
      left: 50%;
      bottom: 22px;
      width: 55px;
      height: 38px;
      transform: translateX(-50%);
      border: 3px solid #e17694;
      border-radius: 48%;
      background: #f98eaa;
      box-shadow: inset 0 4px 0 rgba(255,255,255,.18);
    }

    .nostril {
      position: absolute;
      top: 12px;
      width: 8px;
      height: 11px;
      border-radius: 50%;
      background: #9b5468;
    }

    .nostril.left {
      left: 12px;
    }

    .nostril.right {
      right: 12px;
    }

    .mouth {
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 20px;
      height: 9px;
      transform: translateX(-50%);
      border-top: 3px solid #9b5468;
      border-radius: 50%;
    }

    .tear {
      position: absolute;
      top: 59px;
      width: 11px;
      height: 18px;
      border-radius: 50% 50% 55% 55%;
      background: linear-gradient(#87d6ff, #4da8ea);
      box-shadow: 0 4px 8px rgba(55, 150, 210, .25);
      animation: tearDrop 1.45s ease-in-out infinite;
      z-index: 2;
    }

    .tear.left {
      left: 39px;
    }

    .tear.right {
      right: 39px;
      animation-delay: -.65s;
    }

    .pig-scene.more-sad .tear {
      animation-duration: .8s;
    }

    .pig-scene.happy .tear {
      display: none;
    }

    .pig-scene.happy .eye {
      height: 8px;
      border-radius: 50% 50% 0 0;
      background: transparent;
      border-top: 4px solid #573d49;
    }

    .pig-scene.happy .eye::after {
      display: none;
    }

    .pig-scene.happy .mouth {
      bottom: 5px;
      height: 12px;
      border-top: 0;
      border-bottom: 4px solid #9b5468;
    }

    h1 {
      margin: 10px 0 12px;
      font-size: clamp(30px, 6vw, 50px);
      line-height: 1.15;
      letter-spacing: -.03em;
    }

    .message {
      margin: 0 auto;
      max-width: 560px;
      min-height: 62px;
      font-size: clamp(16px, 3.2vw, 20px);
      line-height: 1.75;
      color: var(--muted);
    }

    .little-note {
      margin: 24px auto 0;
      max-width: 590px;
      padding: 15px 18px;
      border: 1px dashed rgba(138, 121, 214, .34);
      border-radius: 18px;
      background: rgba(248, 246, 255, .66);
      color: #70658b;
      font-size: 14px;
      line-height: 1.65;
    }

    .progress-title {
      margin-top: 24px;
      color: #9a8e9d;
      font-size: 14px;
    }

    .progress {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-top: 10px;
    }

    .progress-dot {
      width: 19px;
      height: 19px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 183, 201, .28);
      color: rgba(255, 111, 145, .42);
      font-size: 11px;
      transition: transform .25s ease, background .25s ease, color .25s ease;
    }

    .progress-dot.active {
      background: #ff8daa;
      color: white;
      transform: scale(1.12);
    }

    .buttons {
      min-height: 150px;
      margin-top: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 5vw, 34px);
      flex-wrap: wrap;
    }

    button {
      position: relative;
      border: 0;
      border-radius: 999px;
      padding: 16px 34px;
      font-family: inherit;
      font-size: clamp(18px, 4vw, 21px);
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      transition:
        transform .3s cubic-bezier(.2, .8, .2, 1),
        opacity .3s ease,
        box-shadow .3s ease,
        filter .3s ease;
      touch-action: manipulation;
    }

    button:focus-visible {
      outline: 4px solid rgba(115, 102, 210, .24);
      outline-offset: 5px;
    }

    #forgiveBtn {
      transform: scale(var(--forgive-scale));
      color: white;
      background: linear-gradient(135deg, var(--pink), var(--pink-deep));
      box-shadow:
        0 14px 32px rgba(239, 79, 123, .34),
        inset 0 1px 0 rgba(255,255,255,.3);
      z-index: 3;
    }

    #forgiveBtn::after {
      content: "♥";
      position: absolute;
      top: -9px;
      right: 10px;
      font-size: 17px;
      animation: pulseHeart 1.4s ease-in-out infinite;
    }

    #forgiveBtn:hover {
      filter: brightness(1.04);
      box-shadow: 0 18px 38px rgba(239, 79, 123, .42);
    }

    #refuseBtn {
      transform: scale(var(--refuse-scale));
      color: #655b69;
      background: linear-gradient(180deg, #f4f5f9, #e8eaf1);
      box-shadow:
        0 10px 24px rgba(76, 72, 93, .14),
        inset 0 1px 0 white;
    }

    #refuseBtn.shake {
      animation: shake .34s ease;
    }

    #refuseBtn.disappear {
      opacity: 0;
      pointer-events: none;
      transform: scale(0);
    }

    .counter {
      min-height: 28px;
      margin-top: 8px;
      color: #9b8e9e;
      font-size: 14px;
    }

    .hint {
      margin-top: 12px;
      color: #ad9eae;
      font-size: 12px;
    }

    .success-screen {
      display: none;
      position: relative;
      z-index: 4;
      text-align: center;
    }

    .success-screen.show {
      display: block;
      animation: successIn .65s cubic-bezier(.2, .9, .2, 1) both;
    }

    .success-heart {
      font-size: clamp(72px, 16vw, 110px);
      animation: happyBounce 1.5s ease-in-out infinite;
    }

    .success-screen h2 {
      margin: 10px 0;
      font-size: clamp(30px, 6vw, 48px);
    }

    .success-screen p {
      color: var(--muted);
      line-height: 1.7;
    }

    .small-close {
      margin-top: 18px;
      color: #ad9eae;
      font-size: 13px;
    }

    .hidden {
      display: none !important;
    }

    .confetti {
      position: absolute;
      top: -40px;
      animation: confettiFall 2.8s ease-in forwards;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) rotate(0deg);
      }
      to {
        transform: translateY(-115vh) rotate(24deg);
      }
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(30px, 24px) scale(1.12); }
    }

    @keyframes pigFloat {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-7px) rotate(1deg); }
    }

    @keyframes tearDrop {
      0% { transform: translateY(-3px) scale(.85); opacity: .65; }
      55% { transform: translateY(10px) scale(1); opacity: 1; }
      100% { transform: translateY(19px) scale(.72); opacity: 0; }
    }

    @keyframes pulseHeart {
      0%, 100% { transform: scale(.9); }
      50% { transform: scale(1.25); }
    }

    @keyframes shake {
      0%, 100% { translate: 0; }
      25% { translate: -7px; }
      50% { translate: 7px; }
      75% { translate: -4px; }
    }

    @keyframes successIn {
      from { opacity: 0; transform: scale(.82) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes happyBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.06); }
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      12% {
        opacity: 1;
      }
      100% {
        transform: translateY(115vh) rotate(540deg);
        opacity: 0;
      }
    }

    @media (max-width: 540px) {
      .app {
        width: 100%;
        padding: 24px 16px 28px;
        border-radius: 26px;
      }

      .pig-scene {
        transform: scale(.9);
        margin-top: -2px;
        margin-bottom: -2px;
      }

      .little-note {
        font-size: 13px;
      }

      .buttons {
        min-height: 132px;
        gap: 16px;
      }

      button {
        padding: 14px 25px;
      }

      .progress {
        gap: 5px;
      }

      .progress-dot {
        width: 17px;
        height: 17px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <div class="floating-layer" id="floatingLayer" aria-hidden="true"></div>
  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

  <main class="app" id="app">
    <section id="questionScreen">
      <div class="badge">💌 一封认真道歉的小纸条</div>

      <div class="pig-scene" id="pigScene" aria-label="一只委屈掉眼泪的小猪">
        <div class="pig-ear left"></div>
        <div class="pig-ear right"></div>

        <div class="pig-face">
          <div class="brow left"></div>
          <div class="brow right"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="tear left"></div>
          <div class="tear right"></div>

          <div class="snout">
            <div class="nostril left"></div>
            <div class="nostril right"></div>
          </div>
          <div class="mouth"></div>
        </div>
      </div>

      <h1 id="title">王婷宝宝可以原谅我吗？</h1>

      <p class="message" id="message">
        我知道我可能让你不开心了。对不起，我真的很在意你的感受，也会认真改正。
      </p>

      <div class="little-note" id="littleNote">
        我保证：小猪已经学会如何放置奖杯了。
      </div>

      <div class="progress-title">小猪的“求原谅”进度</div>
      <div class="progress" id="progress" aria-label="点击不原谅的次数"></div>

      <div class="buttons">
        <button id="forgiveBtn" type="button">原谅你啦</button>
        <button id="refuseBtn" type="button">不原谅</button>
      </div>

      <div class="counter" id="counter">认真想一想再做选择吧</div>
      <div class="hint"></div>
    </section>

    <section class="success-screen" id="successScreen">
      <div class="success-heart">🐷💗</div>
      <h2>谢谢王婷宝宝愿意原谅我</h2>
      <p>
        小猪已经把这次原谅认真收好啦。<br />
        以后会少一点让宝宝难过，多一点让宝宝开心。
      </p>
      <div class="small-close" id="closeHint">
      </div>
    </section>
  </main>

  <script>
    const forgiveBtn = document.getElementById("forgiveBtn");
    const refuseBtn = document.getElementById("refuseBtn");
    const counter = document.getElementById("counter");
    const message = document.getElementById("message");
    const littleNote = document.getElementById("littleNote");
    const pigScene = document.getElementById("pigScene");
    const progress = document.getElementById("progress");
    const questionScreen = document.getElementById("questionScreen");
    const successScreen = document.getElementById("successScreen");
    const confettiLayer = document.getElementById("confettiLayer");
    const floatingLayer = document.getElementById("floatingLayer");
    const closeHint = document.getElementById("closeHint");

    let refuseCount = 0;
    let forgiven = false;

    const sadMessages = [
      "真的不再考虑一下吗？小猪已经开始反省了……",
      "我会认真改，不只是嘴上说说。",
      "再给我一次机会，好不好？",
      "小猪的眼泪已经快装满一杯了。",
      "我会把你的不开心认真记在心里。",
      "原谅按钮好像越来越适合你了。",
      "别让小猪继续哭啦……",
      "我真的知道错了，再考虑一次吧。",
      "只差最后一点点，小猪还在等你。",
      "现在只剩下“原谅”这一个温柔的选择啦。"
    ];

    const noteMessages = [
      "我保证：小猪已经学会如何放置奖杯了",
      "补充保证：不会让我的好宝宝因为这样的事伤心了。",
      "再补一条：宝宝是世界上最可爱的小仙女。",
      "小猪已经把“认真道歉”写进今天最重要的事情里。",
      "你的感受很重要，这句话不是为了哄你，是我真的应该记住。",
      "我会把“对不起”变成下一次更好的行动。",
      "小猪正在努力学习：先理解你，再解释自己。",
      "每一次不原谅，都提醒我这次真的让你难过了。",
      "小猪已经准备好用很长时间证明，去证明去爱王婷宝宝。",
      "好宝宝原谅小猪吧"
    ];

    function buildProgress() {
      for (let i = 0; i < 10; i++) {
        const dot = document.createElement("span");
        dot.className = "progress-dot";
        dot.textContent = "♥";
        progress.appendChild(dot);
      }
    }

    function updateProgress() {
      [...progress.children].forEach((dot, index) => {
        dot.classList.toggle("active", index < refuseCount);
      });
    }

    function createFloatingHearts() {
      const hearts = ["♡", "♥", "💗", "✨"];
      for (let i = 0; i < 18; i++) {
        const item = document.createElement("span");
        item.className = "float-heart";
        item.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        item.style.left = `${Math.random() * 100}%`;
        item.style.fontSize = `${12 + Math.random() * 18}px`;
        item.style.animationDuration = `${8 + Math.random() * 8}s`;
        item.style.animationDelay = `${-Math.random() * 12}s`;
        floatingLayer.appendChild(item);
      }
    }

    function playClickTone(type) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = type === "happy" ? 660 : 240;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.06, ctx.currentTime + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);

        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.24);
      } catch (error) {
        // 音效不可用时不影响页面交互
      }
    }

    function updateButtons() {
      const forgiveScale = Math.min(1 + refuseCount * 0.14, 2.35);
      const refuseScale = Math.max(1 - refuseCount * 0.085, 0.18);

      document.documentElement.style.setProperty(
        "--forgive-scale",
        forgiveScale.toFixed(2)
      );
      document.documentElement.style.setProperty(
        "--refuse-scale",
        refuseScale.toFixed(2)
      );

      message.textContent = sadMessages[refuseCount - 1];
      littleNote.textContent = noteMessages[refuseCount - 1];
      counter.textContent = `已经点击“不原谅” ${refuseCount} 次`;

      pigScene.classList.toggle("more-sad", refuseCount >= 5);
      updateProgress();

      refuseBtn.classList.remove("shake");
      void refuseBtn.offsetWidth;
      refuseBtn.classList.add("shake");

      if (refuseCount >= 10) {
        refuseBtn.classList.add("disappear");
        refuseBtn.setAttribute("aria-hidden", "true");
        counter.textContent = "“不原谅”已经消失，现在只剩下原谅啦";
      }
    }

    function launchConfetti() {
      const symbols = ["♥", "💗", "✨", "🌸", "♡"];
      for (let i = 0; i < 55; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.fontSize = `${14 + Math.random() * 22}px`;
        piece.style.animationDelay = `${Math.random() * 0.8}s`;
        piece.style.animationDuration = `${2.2 + Math.random() * 1.8}s`;
        confettiLayer.appendChild(piece);
      }

      setTimeout(() => {
        confettiLayer.innerHTML = "";
      }, 5000);
    }

    refuseBtn.addEventListener("click", () => {
      if (refuseCount >= 10 || forgiven) return;
      refuseCount += 1;
      playClickTone("sad");
      updateButtons();
    });

    forgiveBtn.addEventListener("click", () => {
      if (forgiven) return;

      forgiven = true;
      playClickTone("happy");
      pigScene.classList.add("happy");
      launchConfetti();

      window.removeEventListener("beforeunload", preventLeaving);

      setTimeout(() => {
        questionScreen.classList.add("hidden");
        successScreen.classList.add("show");
      }, 320);

      setTimeout(() => {
        window.open("", "_self");
        window.close();

        setTimeout(() => {
          closeHint.textContent =
            "浏览器没有允许网页自动关闭，现在可以直接关闭这个标签页。";
        }, 500);
      }, 1800);
    });

    function preventLeaving(event) {
      if (forgiven) return;
      event.preventDefault();
      event.returnValue = "";
    }

    window.addEventListener("beforeunload", preventLeaving);

    buildProgress();
    createFloatingHearts();
  </script>
</body>
</html>
