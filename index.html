<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可以原谅我吗？</title>
  <style>
    :root {
      --forgive-scale: 1;
      --not-forgive-scale: 1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.9), transparent 35%),
        linear-gradient(135deg, #ffd8e5, #dce8ff);
      color: #3f3542;
    }

    .card {
      width: min(680px, 94vw);
      min-height: 390px;
      padding: 48px 30px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 24px 70px rgba(93, 74, 109, 0.22);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .emoji {
      font-size: 64px;
      animation: float 2.4s ease-in-out infinite;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(30px, 6vw, 48px);
      line-height: 1.2;
    }

    .message {
      margin: 0 auto;
      max-width: 520px;
      min-height: 56px;
      font-size: clamp(17px, 3vw, 21px);
      line-height: 1.7;
      color: #6f6373;
    }

    .buttons {
      min-height: 155px;
      margin-top: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 16px 34px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition:
        transform 0.28s ease,
        opacity 0.28s ease,
        box-shadow 0.28s ease,
        padding 0.28s ease;
    }

    button:focus-visible {
      outline: 4px solid rgba(106, 123, 255, 0.28);
      outline-offset: 4px;
    }

    #forgiveBtn {
      transform: scale(var(--forgive-scale));
      color: white;
      background: linear-gradient(135deg, #ff6f91, #ff8fab);
      box-shadow: 0 12px 30px rgba(255, 111, 145, 0.34);
      z-index: 2;
    }

    #forgiveBtn:hover {
      box-shadow: 0 16px 36px rgba(255, 111, 145, 0.42);
    }

    #notForgiveBtn {
      transform: scale(var(--not-forgive-scale));
      color: #63586a;
      background: #eef0f6;
      box-shadow: 0 10px 24px rgba(86, 82, 102, 0.15);
    }

    #notForgiveBtn.disappear {
      opacity: 0;
      pointer-events: none;
      transform: scale(0);
    }

    .counter {
      margin-top: 18px;
      min-height: 28px;
      color: #998d9c;
      font-size: 15px;
    }

    .success {
      animation: pop 0.6s ease both;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pop {
      0% { transform: scale(0.85); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 520px) {
      .card {
        padding: 38px 18px;
      }

      .buttons {
        gap: 20px;
      }

      button {
        padding: 14px 26px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="card" id="card">
    <div class="emoji" id="emoji">🥺</div>
    <h1 id="title">可以原谅我吗？</h1>
    <p class="message" id="message">
      我知道我可能让你不开心了，但我真的很在意你的感受。
    </p>

    <div class="buttons">
      <button id="forgiveBtn" type="button">原谅</button>
      <button id="notForgiveBtn" type="button">不原谅</button>
    </div>

    <div class="counter" id="counter">你还没有作出选择</div>
  </main>

  <script>
    const forgiveBtn = document.getElementById("forgiveBtn");
    const notForgiveBtn = document.getElementById("notForgiveBtn");
    const counter = document.getElementById("counter");
    const message = document.getElementById("message");
    const title = document.getElementById("title");
    const emoji = document.getElementById("emoji");
    const card = document.getElementById("card");

    let refuseCount = 0;
    let forgiven = false;

    const messages = [
      "真的不再考虑一下吗？",
      "我会认真反省的，再给我一次机会吧。",
      "原谅按钮好像更适合你一点。",
      "不要这么狠心嘛……",
      "我已经知道错了，真的。",
      "再点几次，不原谅按钮就要消失啦。",
      "它已经越来越小了。",
      "看来答案已经很明显了。",
      "只差最后一点点啦。",
      "现在只剩下一个选择了。"
    ];

    function updateButtons() {
      const forgiveScale = Math.min(1 + refuseCount * 0.16, 2.6);
      const notForgiveScale = Math.max(1 - refuseCount * 0.09, 0.12);

      document.documentElement.style.setProperty(
        "--forgive-scale",
        forgiveScale.toFixed(2)
      );
      document.documentElement.style.setProperty(
        "--not-forgive-scale",
        notForgiveScale.toFixed(2)
      );

      message.textContent = messages[Math.min(refuseCount - 1, messages.length - 1)];
      counter.textContent = `已经点击“不原谅” ${refuseCount} 次`;

      if (refuseCount >= 10) {
        notForgiveBtn.classList.add("disappear");
        notForgiveBtn.setAttribute("aria-hidden", "true");
        counter.textContent = "“不原谅”按钮已经消失，只能选择原谅啦";
      }
    }

    notForgiveBtn.addEventListener("click", () => {
      if (refuseCount >= 10) return;
      refuseCount += 1;
      updateButtons();
    });

    forgiveBtn.addEventListener("click", () => {
      forgiven = true;

      title.textContent = "谢谢你愿意原谅我！";
      message.textContent = "页面正在尝试关闭。如果浏览器阻止自动关闭，你可以直接关闭这个标签页。";
      emoji.textContent = "🥰";
      counter.textContent = "";
      forgiveBtn.style.display = "none";
      notForgiveBtn.style.display = "none";
      card.classList.add("success");

      window.removeEventListener("beforeunload", preventLeaving);

      setTimeout(() => {
        // 浏览器通常只允许脚本关闭由脚本打开的窗口。
        window.open("", "_self");
        window.close();

        // 自动关闭失败时，显示一个干净的结束页面。
        setTimeout(() => {
          document.body.innerHTML = `
            <main class="card success">
              <div class="emoji">💗</div>
              <h1>已经原谅啦</h1>
              <p class="message"></p>
            </main>
          `;
        }, 400);
      }, 700);
    });

    function preventLeaving(event) {
      if (forgiven) return;
      event.preventDefault();
      event.returnValue = "";
    }

    // 在尚未点击“原谅”时，关闭或刷新页面会出现浏览器原生确认提示。
    // 浏览器安全机制仍允许用户强制离开，网页无法彻底禁止关闭。
    window.addEventListener("beforeunload", preventLeaving);
  </script>
</body>
</html>
